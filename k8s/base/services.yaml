apiVersion: v1
kind: Service
metadata:
  name: ubuntu-service
  namespace: frontend
spec:
  selector:
    app: ubuntu
  ports:
    - port: 80
      targetPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: alpine-service
  namespace: backend
spec:
  selector:
    app: alpine
  ports:
    - port: 80
      targetPort: 80